<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- rounded square background -->
  <rect width="100" height="100" rx="22" fill="#1B4332"/>
  <!-- kit box body -->
  <rect x="18" y="44" width="64" height="36" rx="6" fill="#D8F3DC"/>
  <!-- box lid -->
  <rect x="15" y="36" width="70" height="14" rx="5" fill="#2D6A4F"/>
  <!-- lid ribbon stripe -->
  <rect x="45" y="36" width="10" height="44" rx="3" fill="#F4A261"/>
  <!-- bow left loop -->
  <ellipse cx="38" cy="33" rx="10" ry="7" fill="#F4A261" transform="rotate(-20 38 33)"/>
  <!-- bow right loop -->
  <ellipse cx="62" cy="33" rx="10" ry="7" fill="#F4A261" transform="rotate(20 62 33)"/>
  <!-- bow knot -->
  <circle cx="50" cy="35" r="5" fill="#E08040"/>
</svg>
